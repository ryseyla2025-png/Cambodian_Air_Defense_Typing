            "BOARD": "бһ”бһ“бҹ’бһ‘бҹҮбһҡбһјбһ”бһ’бһ¶бһҸбһ»бһҳбһ·бһ“бһ…бһҳбҹ’бһӣбһ„бһўбһӮбҹ’бһӮбһ·бһҹбһ“бһёбһҳбһҪбһҷбһҠбҹӮбһӣбһ•бҹ’бһ‘бһ»бһҖбһҹбҹҖбһӮбҹ’бһңбһёбһ“бҹ…бһ•бҹ’бһ“бҹӮбһҖбһҳбҹ’бһҒбһ¶бһ„бһ¬бһ•бҹ’бһ“бҹӮбһҖбһ‘бһ¶бҹҶбһ„бһҹбһ„бһҒбһ¶бһ„бҹ”",
            "бһҖбҹ’бһҸбһ¶бһҡ": "бһ”бһ“бҹ’бһ‘бҹҮбһҡбһјбһ”бһ’бһ¶бһҸбһ»бһҳбһ·бһ“бһ…бһҳбҹ’бһӣбһ„бһўбһӮбҹ’бһӮбһ·бһҹбһ“бһёбһҳбһҪбһҷбһҠбҹӮбһӣбһ•бҹ’бһ‘бһ»бһҖбһҹбҹҖбһӮбҹ’бһңбһёбһ“бҹ…бһ•бҹ’бһ“бҹӮбһҖбһҳбҹ’бһҒбһ¶бһ„бһ¬бһ•бҹ’бһ“бҹӮбһҖбһ‘бһ¶бҹҶбһ„бһҹбһ„бһҒбһ¶бһ„бҹ”",
            "CHIP": "бһҖбҹ’бһҡбһ¶бһҳбһҹбҹҠбһёбһӣбһёбһҹбҹ’бһҷбһјбһҳбһҹбҹ’бһҸбһҫбһ„бһҸбһјбһ…бҹ— бһҠбҹӮбһӣбһ“бҹ…бһӣбһҫбһ“бҹ„бҹҮбһҳбһ¶бһ“бһҹбҹҖбһӮбҹ’бһңбһёбһҮбһ¶бһ…бҹ’бһҡбһҫбһ“бһҮбһ¶бһҳбһҪбһҷбһ“бһ№бһ„бһҹбһҳбһ¶бһҹбһ—бһ¶бһӮбһҡбһ¶бһ”бҹӢбһҡбһҷбһ–бһ¶бһ“бҹӢбҹ”",
            "бһҲбһёбһ”": "бһҖбҹ’бһҡбһ¶бһҳбһҹбҹҠбһёбһӣбһёбһҹбҹ’бһҷбһјбһҳбһҹбҹ’бһҸбһҫбһ„бһҸбһјбһ…бҹ— бһҠбҹӮбһӣбһ“бҹ…бһӣбһҫбһ“бҹ„бҹҮбһҳбһ¶бһ“бһҹбҹҖбһӮбҹ’бһңбһёбһҮбһ¶бһ…бҹ’бһҡбһҫбһ“бһҮбһ¶бһҳбһҪбһҷбһ“бһ№бһ„бһҹбһҳбһ¶бһҹбһ—бһ¶бһӮбһҡбһ¶бһ”бҹӢбһҡбһҷбһ–бһ¶бһ“бҹӢбҹ”",
            "CHAT": "бһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһӮбҹ’бһ“бһ¶бһӣбҹҒбһ„ бһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһўбһҖбҹ’бһҹбһҡ бһҹбҹҶбһЎбҹҒбһ„... бһҸбһ¶бһҳбһҡбһҷбҹҲбһ”бһҺбҹ’бһҸбһ¶бһүбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһ”бһҺбҹ’бһҸбһ¶бһүбһҹбһҖбһӣ бһ¬ бһўбҹҠбһ»бһ“бһ’бһәбһҺбһ·бһҸбҹ”",
            "бһҶбһ¶бһҸ": "бһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһӮбҹ’бһ“бһ¶бһӣбҹҒбһ„ бһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһўбһҖбҹ’бһҹбһҡ бһҹбҹҶбһЎбҹҒбһ„... бһҸбһ¶бһҳбһҡбһҷбҹҲбһ”бһҺбҹ’бһҸбһ¶бһүбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһ”бһҺбҹ’бһҸбһ¶бһүбһҹбһҖбһӣ бһ¬ бһўбҹҠбһ»бһ“бһ’бһәбһҺбһ·бһҸбҹ”",
            "DIAL": "бһ”бһ„бҹ’бһҖбһҫбһҸбһҸбҹҶбһҺбһ—бҹ’бһҮбһ¶бһ”бҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ“бһ·бһ„бһ§бһ”бһҖбһҡбһҺбҹҚбһ‘бһјбһҡбһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚбҹ”",
            "бһҠбһ¶бһӣбҹӢ": "бһ”бһ„бҹ’бһҖбһҫбһҸбһҸбҹҶбһҺбһ—бҹ’бһҮбһ¶бһ”бҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ“бһ·бһ„бһ§бһ”бһҖбһҡбһҺбҹҚбһ‘бһјбһҡбһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚбҹ”",
            "DISK": "бһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһ¶бһ“бһҡбһ¶бһ„бһҮбһ¶бһ”бһ“бҹ’бһ‘бҹҮбһҳбһјбһӣбһҹбҹ’бһҸбһҫбһ„ бһ’бҹ’бһңбһҫбһ–бһёбһӣбҹ„бһ бһ’бһ¶бһҸбһ» бһ¬ бһ”бҹ’бһӣбһ¶бһҹбҹ’бһ‘бһ·бһҖ... бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ•бҹ’бһ‘бһ»бһҖбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“ бһҮбһ¶бһўбһ…бһ·бһ“бҹ’бһҸбҹ’бһҡбҹғбһҷбҹҚбҹ”",
            "бһҗбһ¶бһҹ": "бһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһ¶бһ“бһҡбһ¶бһ„бһҮбһ¶бһ”бһ“бҹ’бһ‘бҹҮбһҳбһјбһӣбһҹбҹ’бһҸбһҫбһ„ бһ’бҹ’бһңбһҫбһ–бһёбһӣбҹ„бһ бһ’бһ¶бһҸбһ» бһ¬ бһ”бҹ’бһӣбһ¶бһҹбҹ’бһ‘бһ·бһҖ... бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ•бҹ’бһ‘бһ»бһҖбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“ бһҮбһ¶бһўбһ…бһ·бһ“бҹ’бһҸбҹ’бһҡбҹғбһҷбҹҚбҹ”",
            "LINK": "бһҖбһ¶бһҺбһ¶бһӣбҹӢбһҡбһңбһ¶бһ„бһӮбҹ’бһҡбһҝбһ„ бһ¬ бһ§бһ”бһҖбһҡбһҺбҹҚбһ–бһёбһҡбһҖбҹ’бһ“бһ»бһ„бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚ бһ¬бһҖбһ¶бһҡбһ—бҹ’бһҮбһ¶бһ”бҹӢбһ•бҹ’бһ‘бһ¶бһӣбҹӢбһ‘бҹ…бһўбһ¶бһҹбһҷбһҠбҹ’бһӢбһ¶бһ“бҹ”",
            "бһ”бһүбҹ’бһҮбһ¶бһ”бҹӢ": "бһҖбһ¶бһҺбһ¶бһӣбҹӢбһҡбһңбһ¶бһ„бһӮбҹ’бһҡбһҝбһ„ бһ¬ бһ§бһ”бһҖбһҡбһҺбҹҚбһ–бһёбһҡбһҖбҹ’бһ“бһ»бһ„бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚ бһ¬бһҖбһ¶бһҡбһ—бҹ’бһҮбһ¶бһ”бҹӢбһ•бҹ’бһ‘бһ¶бһӣбҹӢбһ‘бҹ…бһўбһ¶бһҹбһҷбһҠбҹ’бһӢбһ¶бһ“бҹ”",
            "BOOT": "бһ”бһҫбһҖ бһ¬ бһ”бһҫбһҖбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһЎбһҫбһ„бһңбһ·бһү бһ бһҫбһҷ бһҠбһ¶бһҖбҹӢбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһұбҹ’бһҷбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбҹ”",
            "бһ”бҹҠбһјбһҸ": "бһ”бһҫбһҖ бһ¬ бһ”бһҫбһҖбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһЎбһҫбһ„бһңбһ·бһү бһ бһҫбһҷ бһҠбһ¶бһҖбҹӢбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһұбҹ’бһҷбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбҹ”",
            "BYTE": "бһҒбҹ’бһ“бһ¶бһҸбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ¬бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһҠбҹӮбһӣбһҮбһ¶бһ’бһҳбҹ’бһҳбһҸбһ¶бһҳбһ¶бһ“бҹЁ(бһ”бҹ’бһҡбһ¶бҹҶбһ”бһё)бһ”бҹҠбһёбһҸбҹ”",
            "бһ”бҹғ": "бһҒбҹ’бһ“бһ¶бһҸбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ¬бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһҠбҹӮбһӣбһҮбһ¶бһ’бһҳбҹ’бһҳбһҸбһ¶бһҳбһ¶бһ“бҹЁ(бһ”бҹ’бһҡбһ¶бҹҶбһ”бһё)бһ”бҹҠбһёбһҸбҹ”",
            "RUN": "бһ’бҹ’бһңбһҫбһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһ¬бһ’бҹ’бһңбһҫбһҖбһ·бһ…бҹ’бһ…бһҖбһ¶бһҡ бһҠбҹӮбһӣбһҖбҹҶбһҺбһҸбҹӢбһ¬бһ”бһүбҹ’бһҮбһ¶бһҠбҹ„бһҷбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ”",
            "бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·": "бһ’бҹ’бһңбһҫбһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһ¬бһ’бҹ’бһңбһҫбһҖбһ·бһ…бҹ’бһ…бһҖбһ¶бһҡ бһҠбҹӮбһӣбһҖбҹҶбһҺбһҸбҹӢбһ¬бһ”бһүбҹ’бһҮбһ¶бһҠбҹ„бһҷбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ”",
            "WEB": "бһҹбҹҒбһңбһ¶ бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’ бһ¬ бһ”бһҺбҹ’бһҸбһ¶бһүбһҜбһҖбһҹбһ¶бһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“ бһҠбҹӮбһӣбһӮбҹҒбһўбһ¶бһ…бһҹбҹ’бһңбҹӮбһ„бһҡбһҖбһ”бһ¶бһ“бһ“бҹ…бһӣбһҫбһ”бһҺбҹ’бһҸбһ¶бһүбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһ¬бһўбҹҠбһ»бһ“бһ’бһәбһҺбһ·бһҸбҹ”",
            "бһңбҹҒбһ”": "бһҹбҹҒбһңбһ¶ бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’ бһ¬ бһ”бһҺбҹ’бһҸбһ¶бһүбһҜбһҖбһҹбһ¶бһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“ бһҠбҹӮбһӣбһӮбҹҒбһўбһ¶бһ…бһҹбҹ’бһңбҹӮбһ„бһҡбһҖбһ”бһ¶бһ“бһ“бҹ…бһӣбһҫбһ”бһҺбҹ’бһҸбһ¶бһүбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһ¬бһўбҹҠбһ»бһ“бһ’бһәбһҺбһ·бһҸбҹ”",
            "SAVE": "бһ‘бһ»бһҖбһҠбһ¶бһҖбҹӢбһҜбһҖбһҹбһ¶бһҡбһ¬бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҸбҹ’бһҡбһ„бҹӢбһ‘бһёбһҸбһ¶бҹҶбһ„бһҠбһҫбһҳбҹ”",
            "бһҡбһҖбҹ’бһҹбһ¶бһ‘бһ»бһҖ": "бһ‘бһ»бһҖбһҠбһ¶бһҖбҹӢбһҜбһҖбһҹбһ¶бһҡбһ¬бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҸбҹ’бһҡбһ„бҹӢбһ‘бһёбһҸбһ¶бҹҶбһ„бһҠбһҫбһҳбҹ”",
            "PROGRAM": "бһҹбһ»бһҹбһңбҹӮбһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бһүбҹ’бһҮбһ¶бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ”бҹҶбһ–бҹҒбһүбһҖбһ¶бһҡбһ„бһ¶бһҡ бһҠбһјбһ…бһҮбһ¶ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһңбһ¶бһҷбһўбһҸбҹ’бһҗбһ”бһ‘ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһӮбһјбһҡбһ”бҹ’бһӣбһ„бҹӢ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҳбһјбһӣбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбҹ”",
            "бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһё": "бһҹбһ»бһҹбһңбҹӮбһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бһүбҹ’бһҮбһ¶бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ”бҹҶбһ–бҹҒбһүбһҖбһ¶бһҡбһ„бһ¶бһҡ бһҠбһјбһ…бһҮбһ¶ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһңбһ¶бһҷбһўбһҸбҹ’бһҗбһ”бһ‘ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһӮбһјбһҡбһ”бҹ’бһӣбһ„бҹӢ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҳбһјбһӣбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбҹ”",
            "CHANNEL": "бһӮбһ“бҹ’бһӣбһ„бһ¬бһӣбҹ’бһ”бһ·бһ…бһўбҹҒбһЎбһ·бһ…бһҸбҹ’бһҡбһјбһҳбҹүбһ¶бһүбҹҒбһ‘бһ·бһҖбһҠбҹӮбһӣбһӮбҹҒбһҡбҹҖбһ”бһ…бҹҶбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бҹ’бһҡбһҫ бһҖбҹ’бһ“бһ»бһ„бһӣбһҖбҹ’бһҒбһҺбҹҲбһ–бһ·бһҹбҹҒбһҹбһҺбһ¶бһҳбһҪбһҷбҹ”",
            "бһҖбһ¶бһҺбһ¶бһӣбҹӢ": "бһӮбһ“бҹ’бһӣбһ„бһ¬бһӣбҹ’бһ”бһ·бһ…бһўбҹҒбһЎбһ·бһ…бһҸбҹ’бһҡбһјбһҳбҹүбһ¶бһүбҹҒбһ‘бһ·бһҖбһҠбҹӮбһӣбһӮбҹҒбһҡбҹҖбһ”бһ…бҹҶбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бҹ’бһҡбһҫ бһҖбҹ’бһ“бһ»бһ„бһӣбһҖбҹ’бһҒбһҺбҹҲбһ–бһ·бһҹбҹҒбһҹбһҺбһ¶бһҳбһҪбһҷбҹ”",
            "SYSTEM": "бһҹбҹҶбһҺбһ»бҹҶбһ§бһ”бһҖбһҡбһҺбҹҚ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһё бһ¬ бһ”бһҡбһ·бһҖбҹ’бһҒбһ¶бһҡбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһӮбҹҒбһҡбҹҖбһ”бһ…бҹҶбһ“бһ·бһ„бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ”бһүбҹ’бһ…бһјбһӣбһӮбҹ’бһ“бһ¶ бһҖбҹ’бһ“бһ»бһ„бһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһҺбһ¶бһҳбһҪбһҷбҹ”",
            "бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’": "бһҹбҹҶбһҺбһ»бҹҶбһ§бһ”бһҖбһҡбһҺбҹҚ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһё бһ¬ бһ”бһҡбһ·бһҖбҹ’бһҒбһ¶бһҡбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһӮбҹҒбһҡбҹҖбһ”бһ…бҹҶбһ“бһ·бһ„бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ”бһүбҹ’бһ…бһјбһӣбһӮбҹ’бһ“бһ¶ бһҖбҹ’бһ“бһ»бһ„бһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһҺбһ¶бһҳбһҪбһҷбҹ”",
            "ACCOUNT": "бһҖбһ¶бһҡбһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ¬бһҹбҹҒбһңбһ¶бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹ„бһҷбһҳбһ¶бһ“бһўбһҸбҹ’бһҗбһ“бһ¶бһҳбһ“бһ·бһ„бһҖбҹҶбһҺбһҸбҹӢбһҸбҹ’бһҡбһ¶бһ…бһ¶бҹҶбһ”бһ¶бһ…бҹӢбһ•бҹ’бһҹбҹҒбһ„бҹ—бһ‘бҹҖбһҸбҹ”",
            "бһӮбһҺбһ“бһё": "бһҖбһ¶бһҡбһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ¬бһҹбҹҒбһңбһ¶бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹ„бһҷбһҳбһ¶бһ“бһўбһҸбҹ’бһҗбһ“бһ¶бһҳбһ“бһ·бһ„бһҖбҹҶбһҺбһҸбҹӢбһҸбҹ’бһҡбһ¶бһ…бһ¶бҹҶбһ”бһ¶бһ…бҹӢбһ•бҹ’бһҹбҹҒбһ„бҹ—бһ‘бҹҖбһҸбҹ”",
            "NETWORK": "бһ”бһҺбҹ’бһҠбһ»бҹҶ бһҳбһ’бҹ’бһҷбҹ„бһ”бһ¶бһҷбһ“бҹғбһҖбһ¶бһҡбһҸбһ—бҹ’бһҮбһ¶бһ”бҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһ–бһ»бһҳбҹ’бһ– бһ“бһ·бһ„ бһ§бһ”бһҖбһҡбһҺбҹҚбһ•бҹ’бһҹбҹҒбһ„бҹ—бһҡбһҪбһҳбһӮбҹ’бһ“бһ¶ бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһ–бһҪбһҖбһңбһ¶бһўбһ¶бһ…бһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бҹ”",
            "бһ”бһҺбҹ’бһҸбһ¶бһү": "бһ”бһҺбҹ’бһҠбһ»бҹҶ бһҳбһ’бҹ’бһҷбҹ„бһ”бһ¶бһҷбһ“бҹғбһҖбһ¶бһҡбһҸбһ—бҹ’бһҮбһ¶бһ”бҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһ–бһ»бһҳбҹ’бһ– бһ“бһ·бһ„ бһ§бһ”бһҖбһҡбһҺбҹҚбһ•бҹ’бһҹбҹҒбһ„бҹ—бһҡбһҪбһҳбһӮбҹ’бһ“бһ¶ бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһ–бһҪбһҖбһңбһ¶бһўбһ¶бһ…бһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бҹ”",
            "FOLDER": "бһҖбһ“бҹ’бһӣбҹӮбһ„бһ•бҹ’бһ‘бһ»бһҖбһҜбһҖбһҹбһ¶бһҡбһҖбҹ’бһ“бһ»бһ„бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ”",
            "бһҗбһҸ": "бһҖбһ“бҹ’бһӣбҹӮбһ„бһ•бҹ’бһ‘бһ»бһҖбһҜбһҖбһҹбһ¶бһҡбһҖбҹ’бһ“бһ»бһ„бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ”",
            "BUTTON": "бһ•бҹ’бһ“бҹӮбһҖбһҡбһ¶бһ„бһ…бһҸбһ»бһҖбҹ„бһҺбһҖбҹӮбһ„бһӣбһҫбһ•бҹ’бһ‘бҹғбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ бһҠбҹӮбһӣбһӮбҹҒбһўбһ¶бһ…бһ…бһ»бһ…бһӣбһҫбһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһҖбһҺбҹ’бһҸбһ»бһҡбһ¬бһҖбҹ’бһҸбһ¶бһҡбһ…бһ»бһ… бһҠбһҫбһҳбҹ’бһ”бһёбһ’бҹ’бһңбһҫбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһўбҹ’бһңбһёбһҳбһҪбһҷбҹ”",
            "бһ”бҹҠбһјбһҸбһ»бһ„": "бһ•бҹ’бһ“бҹӮбһҖбһҡбһ¶бһ„бһ…бһҸбһ»бһҖбҹ„бһҺбһҖбҹӮбһ„бһӣбһҫбһ•бҹ’бһ‘бҹғбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ бһҠбҹӮбһӣбһӮбҹҒбһўбһ¶бһ…бһ…бһ»бһ…бһӣбһҫбһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһҖбһҺбҹ’бһҸбһ»бһҡбһ¬бһҖбҹ’бһҸбһ¶бһҡбһ…бһ»бһ… бһҠбһҫбһҳбҹ’бһ”бһёбһ’бҹ’бһңбһҫбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһўбҹ’бһңбһёбһҳбһҪбһҷбҹ”",
            "PRINTER": "бһ§бһ”бһҖбһҡбһҺбҹҚбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бҹ„бҹҮбһ–бһ»бһҳбҹ’бһ–бһўбһҖбҹ’бһҹбһҡбһ¬бһҡбһјбһ”бһ—бһ¶бһ–бһ“бҹ…бһӣбһҫбһҖбҹ’бһҡбһҠбһ¶бһҹбһ¬бһ“бҹ…бһӣбһҫбһҹбһҳбҹ’бһ—бһ¶бһҡбҹҲбһ•бҹ’бһҹбҹҒбһ„бһ‘бҹҖбһҸ бһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһ‘бһ№бһҖбһҗбҹ’бһ“бһ¶бҹҶбһҸбһ¶бһҳбһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһ“бһ·бһ„бһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҡбһ”бһҹбҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ”",
            "бһ–бһ»бһҳбҹ’бһ–": "бһ§бһ”бһҖбһҡбһҺбҹҚбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бҹ„бҹҮбһ–бһ»бһҳбҹ’бһ–бһўбһҖбҹ’бһҹбһҡбһ¬бһҡбһјбһ”бһ—бһ¶бһ–бһ“бҹ…бһӣбһҫбһҖбҹ’бһҡбһҠбһ¶бһҹбһ¬бһ“бҹ…бһӣбһҫбһҹбһҳбҹ’бһ—бһ¶бһҡбҹҲбһ•бҹ’бһҹбҹҒбһ„бһ‘бҹҖбһҸ бһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһ‘бһ№бһҖбһҗбҹ’бһ“бһ¶бҹҶбһҸбһ¶бһҳбһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһ“бһ·бһ„бһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҡбһ”бһҹбҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ”",
            "SCREEN": "бһ•бҹ’бһ“бҹӮбһҖбһҳбһҪбһҷбһ“бҹғбһ§бһ”бһ‘бһҹбҹ’бһҹбһ“бҹҚбһ¬бһ§бһ”бһҖбһҡбһҺбҹҚбһҠбҹӮбһӣбһ—бҹ’бһҮбһ¶бһ”бҹӢбһ‘бҹ…бһ“бһ№бһ„бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бһ„бҹ’бһ бһ¶бһүбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бҹ”",
            "бһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ": "бһ•бҹ’бһ“бҹӮбһҖбһҳбһҪбһҷбһ“бҹғбһ§бһ”бһ‘бһҹбҹ’бһҹбһ“бҹҚбһ¬бһ§бһ”бһҖбһҡбһҺбҹҚбһҠбҹӮбһӣбһ—бҹ’бһҮбһ¶бһ”бҹӢбһ‘бҹ…бһ“бһ№бһ„бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бһ„бҹ’бһ бһ¶бһүбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бҹ”",
            "SCANNER": "бһ§бһ”бһҖбһҡбһҺбҹҚбһ¬бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһҠбҹӮбһӣбһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҹбҹ’бһҖбҹӮбһ“бҹ”",
            "бһҹбҹ’бһҖбҹӮбһ“бһ“бҹҗбһҡ": "бһ§бһ”бһҖбһҡбһҺбҹҚбһ¬бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһҠбҹӮбһӣбһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҹбҹ’бһҖбҹӮбһ“бҹ”",
            "OFFLINE": "бһҳбһ·бһ“бһҮбһ¶бһ”бҹӢбһ¬бһҳбһ·бһ“бһ”бҹ’бһҡбһ»бһ„бһ”бҹ’бһҡбҹҖбһ”бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһҮбһ¶бһҳбһҪбһҷбһ§бһ”бһҖбһҡбһҺбҹҚбһ¬бһ”бһҺбҹ’бһҸбһ¶бһүбһҺбһ¶бһҳбһҪбһҷбҹ”",
            "бһўбһ бҹ’бһңбһЎбһ¶бһү": "бһҳбһ·бһ“бһҮбһ¶бһ”бҹӢбһ¬бһҳбһ·бһ“бһ”бҹ’бһҡбһ»бһ„бһ”бҹ’бһҡбҹҖбһ”бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһҮбһ¶бһҳбһҪбһҷбһ§бһ”бһҖбһҡбһҺбҹҚбһ¬бһ”бһҺбҹ’бһҸбһ¶бһүбһҺбһ¶бһҳбһҪбһҷбҹ”",
            "ONLINE": "бһҖбҹҶбһ–бһ»бһ„бһҮбһ¶бһ”бҹӢ (бһҳбһ·бһ“бһҠбһ¶бһ…бҹӢ) бһ¬ бһ”бҹ’бһҡбһ»бһ„бһ”бҹ’бһҡбҹҖбһ”бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһҮбһ¶бһҳбһҪбһҷбһ§бһ”бһҖбһҡбһҺбҹҚбһ¬бһ”бһҺбҹ’бһҸбһ¶бһүбһҺбһ¶бһҳбһҪбһҷбҹ”",
            "бһўбһ“бһЎбһ¶бһү": "бһҖбҹҶбһ–бһ»бһ„бһҮбһ¶бһ”бҹӢ (бһҳбһ·бһ“бһҠбһ¶бһ…бҹӢ) бһ¬ бһ”бҹ’бһҡбһ»бһ„бһ”бҹ’бһҡбҹҖбһ”бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһҮбһ¶бһҳбһҪбһҷбһ§бһ”бһҖбһҡбһҺбҹҚбһ¬бһ”бһҺбҹ’бһҸбһ¶бһүбһҺбһ¶бһҳбһҪбһҷбҹ”",
            "FONT": "бһҹбҹҶбһҺбһ»бҹҶбһҸбһҪбһўбһҖбҹ’бһҹбһҡбһҠбҹӮбһӣбһҳбһ¶бһ“бһҡбһ…бһ“бһ¶бһ”бһҗ бһ‘бҹҶбһ бҹҶ бһ“бһ·бһ„бһ”бҹ’бһҡбһ—бҹҒбһ‘бһҸбҹӮбһҳбһҪбһҷбҹ”",
            "бһ–бһ»бһҳбҹ’бһ–бһўбһҖбҹ’бһҹбһҡ": "бһҹбҹҶбһҺбһ»бҹҶбһҸбһҪбһўбһҖбҹ’бһҹбһҡбһҠбҹӮбһӣбһҳбһ¶бһ“бһҡбһ…бһ“бһ¶бһ”бһҗ бһ‘бҹҶбһ бҹҶ бһ“бһ·бһ„бһ”бҹ’бһҡбһ—бҹҒбһ‘бһҸбҹӮбһҳбһҪбһҷбҹ”",
            "MEMORY": "бһ§бһ”бһҖбһҡбһҺбҹҚ бһӮбҹ’бһҡбһҝбһ„ бһ¬ бһ•бҹ’бһ“бҹӮбһҖбһ“бҹғбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһўбһ¶бһ…бһ•бҹ’бһ‘бһ»бһҖбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһё бһҮбһ¶бһўбһ…бһ·бһ“бҹ’бһҸбҹ’бһҡбҹғбһҷбҹҚ бһ¬ бһ”бһҺбҹ’бһҸбҹ„бҹҮбһўбһ¶бһҹбһ“бҹ’бһ“бҹ”",
            "бһҳбҹҒбһҳбҹүбһјбһҡбһё": "бһ§бһ”бһҖбһҡбһҺбҹҚ бһӮбҹ’бһҡбһҝбһ„ бһ¬ бһ•бҹ’бһ“бҹӮбһҖбһ“бҹғбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһўбһ¶бһ…бһ•бҹ’бһ‘бһ»бһҖбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһё бһҮбһ¶бһўбһ…бһ·бһ“бҹ’бһҸбҹ’бһҡбҹғбһҷбҹҚ бһ¬ бһ”бһҺбҹ’бһҸбҹ„бҹҮбһўбһ¶бһҹбһ“бҹ’бһ“бҹ”",
            "TOOL": "бһҹбҹҶбһҺбһ»бҹҶбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһ¬бһ”бҹ’бһҡбһҠбһ¶бһ”бҹӢбһ”бҹ’бһҡбһҠбһ¶бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бҹ’бһҡбһҫбһҖбҹ’бһ“бһ»бһ„бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ¬бһҖбҹ’бһ“бһ»бһ„бһ”бһҺбҹ’бһҸбһ¶бһүбҹ”",
            "бһ§бһ”бһҖбһҡбһҺбҹҚ": "бһҹбҹҶбһҺбһ»бҹҶбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһ¬бһ”бҹ’бһҡбһҠбһ¶бһ”бҹӢбһ”бҹ’бһҡбһҠбһ¶бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бҹ’бһҡбһҫбһҖбҹ’бһ“бһ»бһ„бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ¬бһҖбҹ’бһ“бһ»бһ„бһ”бһҺбҹ’бһҸбһ¶бһүбҹ”",
            "ACCELERATION": "бһҖбһ¶бһҡбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһҹбҹ’бһ‘бһ»бҹҮбһӣбһҝбһ“бҹ”",
            "бһҖбһ¶бһҡбһ–бһ“бҹ’бһӣбһҝбһ“": "бһҖбһ¶бһҡбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһҹбҹ’бһ‘бһ»бҹҮбһӣбһҝбһ“бҹ”",
            "CRYPTOGRAPHY": "бһҖбһ¶бһҡбһҹбһ·бһҖбҹ’бһҹбһ¶бһ–бһёбһңбһ·бһ’бһёбһ”бҹҶбһ”бҹ’бһӣбҹӮбһ„бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ‘бҹ…бһҮбһ¶бһҖбһјбһҠбҹ”",
            "бһҖбһјбһҠбһңбһ·бһ‘бҹ’бһҷбһ¶": "бһҖбһ¶бһҡбһҹбһ·бһҖбҹ’бһҹбһ¶бһ–бһёбһңбһ·бһ’бһёбһ”бҹҶбһ”бҹ’бһӣбҹӮбһ„бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ‘бҹ…бһҮбһ¶бһҖбһјбһҠбҹ”",
            "COMMUNICATION": "бһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһјбһ“бһ¬бһ”бҹ’бһҸбһјбһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ‘бҹ…бһңбһ·бһүбһ‘бҹ…бһҳбһҖбһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһҪбһҷбһ‘бҹ…бһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһҪбһҷбҹ”",
            "бһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚ": "бһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһјбһ“бһ¬бһ”бҹ’бһҸбһјбһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ‘бҹ…бһңбһ·бһүбһ‘бҹ…бһҳбһҖбһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһҪбһҷбһ‘бҹ…бһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһҪбһҷбҹ”",
            "MOTHERBOARD": "бһ”бһ“бҹ’бһ‘бҹҮбһҠбҹҸбһҹбҹҶбһҒбһ¶бһ“бҹӢбһ“бҹғбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһҮбһ¶бһҖбһ“бҹ’бһӣбҹӮбһ„бһ•бҹ’бһ‘бһ»бһҖбһҒбһҪбһҡбһҖбҹ’бһ”бһ¶бһӣбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһҖбһ¶бһҸбһҳбҹҒбһҳбҹүбһјбһҡбһёбһ•бҹ’бһҹбҹҒбһ„бҹ— бһҲбһёбһ”бһҹбҹҶбһҒбһ¶бһ“бҹӢбҹ—бҹ”",
            "бһҖбҹ’бһҸбһ¶бһҡбһҳбҹҒ": "бһ”бһ“бҹ’бһ‘бҹҮбһҠбҹҸбһҹбҹҶбһҒбһ¶бһ“бҹӢбһ“бҹғбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһҮбһ¶бһҖбһ“бҹ’бһӣбҹӮбһ„бһ•бҹ’бһ‘бһ»бһҖбһҒбһҪбһҡбһҖбҹ’бһ”бһ¶бһӣбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡ бһҖбһ¶бһҸбһҳбҹҒбһҳбҹүбһјбһҡбһёбһ•бҹ’бһҹбҹҒбһ„бҹ— бһҲбһёбһ”бһҹбҹҶбһҒбһ¶бһ“бҹӢбҹ—бҹ”",
            "FIREWALL": "бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһҹбһ»бһңбһҸбҹ’бһҗбһ·бһ—бһ¶бһ– бһҠбҹӮбһӣбһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһӣбҹҶбһ бһјбһҡбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ–бһёбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҳбһҪбһҷбһ‘бҹ…бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҳбһҪбһҷбһ‘бҹҖбһҸбҹ”",
            "бһҮбһүбҹ’бһҮбһ¶бҹҶбһ„бһ—бҹ’бһӣбһҫбһ„": "бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһҹбһ»бһңбһҸбҹ’бһҗбһ·бһ—бһ¶бһ– бһҠбҹӮбһӣбһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһӣбҹҶбһ бһјбһҡбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ–бһёбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҳбһҪбһҷбһ‘бҹ…бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҳбһҪбһҷбһ‘бҹҖбһҸбҹ”",
            "SYNCHRONIZATION": "бһҖбһ¶бһҡбһ”бһ„бҹ’бһҡбһҪбһ”бһ”бһ„бҹ’бһҡбһҪбһҳбһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһ¬бһҖбһ¶бһӣбһңбҹҒбһӣбһ¶бһұбҹ’бһҷбһҹбҹ’бһҳбһҫбһӮбҹ’бһ“бһ¶бһҡбһңбһ¶бһ„бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ¬бһ§бһ”бһҖбһҡбһҺбҹҚбһ–бһёбһҡбҹ”",
            "бһҹбһҳбһҖбһ¶бһӣбһҖбһҳбҹ’бһҳ": "бһҖбһ¶бһҡбһ”бһ„бҹ’бһҡбһҪбһ”бһ”бһ„бҹ’бһҡбһҪбһҳбһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһ¬бһҖбһ¶бһӣбһңбҹҒбһӣбһ¶бһұбҹ’бһҷбһҹбҹ’бһҳбһҫбһӮбҹ’бһ“бһ¶бһҡбһңбһ¶бһ„бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ¬бһ§бһ”бһҖбһҡбһҺбҹҚбһ–бһёбһҡбҹ”",
            "ALGORITHM": "бһ”бһҺбҹ’бһҸбһ¶бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһ“бһ·бһ„бһӮбҹ„бһӣбһҖбһ¶бһҡбһҺбҹҚ бһҠбҹӮбһӣбһ”бҹ’бһҡбһҫбһҠбһҫбһҳбҹ’бһ”бһёбһўбһ“бһ»бһңбһҸбҹ’бһҸбһ¬бһҠбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷбһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһ¬бһ”бһүбҹ’бһ бһ¶бһҺбһ¶бһҳбһҪбһҷбҹ”",
            "бһўбһ¶бһӣбҹӢбһ бҹ’бһӮбҹ„бһҡбһёбһҸ": "бһ”бһҺбҹ’бһҸбһ¶бһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһ“бһ·бһ„бһӮбҹ„бһӣбһҖбһ¶бһҡбһҺбҹҚ бһҠбҹӮбһӣбһ”бҹ’бһҡбһҫбһҠбһҫбһҳбҹ’бһ”бһёбһўбһ“бһ»бһңбһҸбҹ’бһҸбһ¬бһҠбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷбһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһ¬бһ”бһүбҹ’бһ бһ¶бһҺбһ¶бһҳбһҪбһҷбҹ”",
            "AUTHENTICATION": "бһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһўбһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһҺбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҖбҹ’бһ“бһ»бһ„бһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһҹбһ“бҹ’бһҸбһ·бһҹбһ»бһҒ бһҠбҹ„бһҷбһҖбһ¶бһҡбһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбҹ”",
            "бһҷбһҗбһ¶бһ—бһјбһҸбһҖбһҳбҹ’бһҳ": "бһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһўбһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһҺбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҖбҹ’бһ“бһ»бһ„бһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһҹбһ“бҹ’бһҸбһ·бһҹбһ»бһҒ бһҠбҹ„бһҷбһҖбһ¶бһҡбһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбҹ”",
            "TELECOMMUNICATION": "бһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚбһҠбҹӮбһӣбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһ‘бҹ…бһӣбһҫбһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһјбһ“бһ–бһёбһ…бһҳбҹ’бһ„бһ¶бһҷбһ“бһјбһңбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ бһҹбҹҶбһЎбҹҒбһ„ бһңбһёбһҠбҹҒбһўбһј бһ“бһ·бһ„ бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ•бҹ’бһҹбҹҒбһ„бҹ—бҹ”",
            "бһ‘бһјбһҡбһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚ": "бһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚбһҠбҹӮбһӣбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһ‘бҹ…бһӣбһҫбһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһјбһ“бһ–бһёбһ…бһҳбҹ’бһ„бһ¶бһҷбһ“бһјбһңбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ бһҹбҹҶбһЎбҹҒбһ„ бһңбһёбһҠбҹҒбһўбһј бһ“бһ·бһ„ бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ•бҹ’бһҹбҹҒбһ„бҹ—бҹ”",
            "INTERNETWORKING": "бһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһ‘бҹ…бһңбһ·бһүбһ‘бҹ…бһҳбһҖбһҡбһңбһ¶бһ„бһ”бһҺбҹ’бһҸбһ¶бһүбһ–бһёбһҡ бһ¬бһ…бҹ’бһҡбһҫбһ“бҹ”",
            "бһўбһ“бҹ’бһҸбһҡбһҖбһҳбҹ’бһҳбһ“бҹғбһ”бһҺбҹ’бһҸбһ¶бһү": "бһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһ‘бҹ…бһңбһ·бһүбһ‘бҹ…бһҳбһҖбһҡбһңбһ¶бһ„бһ”бһҺбҹ’бһҸбһ¶бһүбһ–бһёбһҡ бһ¬бһ…бҹ’бһҡбһҫбһ“бҹ”",
            "ACCELERATOR CARD": "бһҖбһ¶бһҸбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ–бһ“бҹ’бһӣбһҝбһ“бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһұбҹ’бһҷбһ”бһ¶бһ“бһӣбһҝбһ“бһҮбһ¶бһ„бһҳбһ»бһ“бҹ”",
            "бһҖбһ¶бһҸбһ–бһ“бҹ’бһӣбһҝбһ“": "бһҖбһ¶бһҸбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ–бһ“бҹ’бһӣбһҝбһ“бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһұбҹ’бһҷбһ”бһ¶бһ“бһӣбһҝбһ“бһҮбһ¶бһ„бһҳбһ»бһ“бҹ”",
            "ENCRYPTED CHANNEL": "бһҖбһ¶бһҺбһ¶бһӣбҹӢбһ“бҹғбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһҖбһјбһҠбһҹбһҳбҹ’бһ„бһ¶бһҸбҹӢбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҶбҹ’бһӣбһ„бһҖбһ¶бһҸбҹӢбһҡбһңбһ¶бһ„бһ§бһ”бһҖбһҡбһҺбҹҚбһ–бһёбһҡбҹ”",
            "бһҖбһ¶бһҺбһ¶бһӣбҹӢбһҖбһјбһҠбһҹбһҳбҹ’бһ„бһ¶бһҸбҹӢ": "бһҖбһ¶бһҺбһ¶бһӣбҹӢбһ“бҹғбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһҖбһјбһҠбһҹбһҳбҹ’бһ„бһ¶бһҸбҹӢбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҶбҹ’бһӣбһ„бһҖбһ¶бһҸбҹӢбһҡбһңбһ¶бһ„бһ§бһ”бһҖбһҡбһҺбҹҚбһ–бһёбһҡбҹ”",
            "DATA CHANNEL": "бһҖбһ¶бһҺбһ¶бһӣбҹӢбһ“бҹғбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһ”бҹ’бһҡбһҫбһ“бҹ…бһ–бҹҒбһӣбһ”бһүбҹ’бһҮбһјбһ“бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ–бһёбһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһҪбһҷбһ‘бҹ…бһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһҪбһҷбһ‘бҹҖбһҸбҹ”",
            "бһҖбһ¶бһҺбһ¶бһӣбҹӢбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ": "бһҖбһ¶бһҺбһ¶бһӣбҹӢбһ“бҹғбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһ”бҹ’бһҡбһҫбһ“бҹ…бһ–бҹҒбһӣбһ”бһүбҹ’бһҮбһјбһ“бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ–бһёбһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһҪбһҷбһ‘бҹ…бһ§бһ”бһҖбһҡбһҺбҹҚбһҳбһҪбһҷбһ‘бҹҖбһҸбҹ”",
            "DATA STREAM": "бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҠбҹӮбһӣбһ”бһүбҹ’бһҮбһјбһ“бһ”бһ“бҹ’бһҸбһӮбҹ’бһ“бһ¶бһҳбҹ’бһҸбһ„бһҳбһҪбһҷбһ”бҹғбһҳбҹ’бһҸбһ„бһҳбһҪбһҷбһ”бҹғбҹ”",
            "бһҒбҹ’бһҹбҹӮбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ": "бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҠбҹӮбһӣбһ”бһүбҹ’бһҮбһјбһ“бһ”бһ“бҹ’бһҸбһӮбҹ’бһ“бһ¶бһҳбҹ’бһҸбһ„бһҳбһҪбһҷбһ”бҹғбһҳбҹ’бһҸбһ„бһҳбһҪбһҷбһ”бҹғбҹ”",
            "DATA COMMUNICATION": "бһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚбһҠбҹӮбһӣбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһӣбһҫбһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһјбһ“бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҮбһ¶бһӣбһҖбҹ’бһҒбһҺбҹҲбһҢбһёбһҮбһёбһҗбһӣбҹ”",
            "бһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ": "бһӮбһҳбһ“бһ¶бһӮбһҳбһ“бҹҚбһҠбҹӮбһӣбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһӣбһҫбһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһјбһ“бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҮбһ¶бһӣбһҖбҹ’бһҒбһҺбҹҲбһҢбһёбһҮбһёбһҗбһӣбҹ”",
            "DOMAIN NAME": "бһ“бһ¶бһҳбһ¬бһўбһ¶бһҹбһҷбһҠбҹ’бһӢбһ¶бһ“бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһҹбҹ’бһҗбһ¶бһ”бҹҗбһ“бһҖбҹ’бһ“бһ»бһ„бһ”бһҺбҹ’бһҸбһ¶бһүбһўбҹҠбһёбһ“бһ’бһәбһҺбһ·бһҸбҹ”",
            "бһҲбҹ’бһҳбҹ„бҹҮбһҠбҹӮбһ“": "бһ“бһ¶бһҳбһ¬бһўбһ¶бһҹбһҷбһҠбҹ’бһӢбһ¶бһ“бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһҹбҹ’бһҗбһ¶бһ”бҹҗбһ“бһҖбҹ’бһ“бһ»бһ„бһ”бһҺбҹ’бһҸбһ¶бһүбһўбҹҠбһёбһ“бһ’бһәбһҺбһ·бһҸбҹ”",
            "REMOVABLE DISK": "бһ”бҹ’бһҡбһ—бҹҒбһ‘бһҗбһ¶бһҹбһҳбһҪбһҷбһҠбҹӮбһӣбһўбһ¶бһ…бһұбҹ’бһҷбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ„бһ¶бһҷбһҹбҹ’бһҡбһҪбһӣбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҠбҹ„бһҷбһҳбһ·бһ“бһ…бһ¶бҹҶбһ”бһ¶бһ…бҹӢбһҠбҹ„бҹҮбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ”",
            "бһҗбһ¶бһҹбһ…бһӣбҹҗбһҸ": "бһ”бҹ’бһҡбһ—бҹҒбһ‘бһҗбһ¶бһҹбһҳбһҪбһҷбһҠбҹӮбһӣбһўбһ¶бһ…бһұбҹ’бһҷбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ„бһ¶бһҷбһҹбҹ’бһҡбһҪбһӣбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҠбҹ„бһҷбһҳбһ·бһ“бһ…бһ¶бҹҶбһ”бһ¶бһ…бҹӢбһҠбҹ„бҹҮбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ”",
            "FLOPPY DISK": "бһҗбһ¶бһҹбһҳбҹүбһ¶бһүбҹҒбһ‘бһ·бһҖбһҹбҹ’бһҸбһҫбһ„бһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһӮбҹҒбһҠбһ¶бһҖбҹӢбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ”бҹ’бһҡбһўбһ”бҹӢбһ”бҹ’бһӣбһ¶бһҹбҹ’бһ‘бһ·бһҖбһҡбһ¶бһ„бһҖбһ¶бһҡбҹүбҹҒбҹ”",
            "бһҗбһ¶бһҹбһ‘бһ“бҹӢ": "бһҗбһ¶бһҹбһҳбҹүбһ¶бһүбҹҒбһ‘бһ·бһҖбһҹбҹ’бһҸбһҫбһ„бһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһӮбҹҒбһҠбһ¶бһҖбҹӢбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ”бҹ’бһҡбһўбһ”бҹӢбһ”бҹ’бһӣбһ¶бһҹбҹ’бһ‘бһ·бһҖбһҡбһ¶бһ„бһҖбһ¶бһҡбҹүбҹҒбҹ”",
            "HARD DISK": "бһҗбһ¶бһҹбһҳбҹүбһ¶бһүбҹҒбһ‘бһ·бһҖ бһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһӮбҹҒбһҠбһ¶бһҖбҹӢбһҮбһ¶бһ”бҹӢбһ¬бһ—бҹ’бһҮбһ¶бһ”бҹӢбһҖбҹ’бһ“бһ»бһ„бһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбҹ”",

        class Star {
            constructor(isInitial = false) {
                this.x = isInitial ? Math.random() * canvas.width : canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speed = Math.random() * 3 + 1;
            }
            update() {
                this.x -= this.speed;
                if (this.x < 0) {
                    this.x = canvas.width;
                    this.y = Math.random() * canvas.height;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Player {
            constructor() {
                this.baseX = 80;
                this.x = this.baseX;
                this.y = canvas.height / 2 - 25;
                this.targetY = this.y;
                this.width = 90;
                this.height = 50;
                this.isDead = false;
                this.fallSpeed = 0;
            }
            setTargetY(newY) {
                if (!this.isDead) this.targetY = newY - (this.height / 2);
            }
            dash() {
                if (!this.isDead) this.x = 150;
            }
            update() {
                if (this.isDead) {
                    this.fallSpeed += 0.5;
                    this.y += this.fallSpeed;
                    this.x -= 2;
                    return;
                }
                let ease = 0.1;
                this.y += (this.targetY - this.y) * ease;
                if (this.x > this.baseX) this.x -= 2;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                if (this.isDead) ctx.rotate(this.fallSpeed * 0.05);
                ctx.drawImage(playerImg, -this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            }
        }

        class Enemy {
            constructor(wordTarget, enemySpeed, canShoot = false, isBoss = false) {
                this.isBoss = isBoss;
                this.width = isBoss ? 240 : 80;
                this.height = isBoss ? 135 : 45;
                this.x = canvas.width;
                this.y = isBoss ? (canvas.height / 2 - this.height / 2) : (Math.random() * (canvas.height - 150) + 50);

                this.word = wordTarget;
                this.speed = enemySpeed;
                this.isTargeted = false;

                this.canShoot = canShoot;
                this.lastShotTime = Date.now();
                this.shotInterval = isBoss ? (Math.random() * 1000 + 800) : (Math.random() * 2000 + 1500);
            }
            update() {
                if (!this.isTargeted && !this.isBoss) {
                    this.x -= this.speed;
                } else if (this.isBoss) {
                    if (this.x > canvas.width - this.width - 40) {
                        this.x -= this.speed;
                    }
                }

                if (this.canShoot && Date.now() - this.lastShotTime > this.shotInterval) {
                    if (this.isBoss) {
                        enemyBullets.push(new EnemyBullet(this.x, this.y + this.height * 0.2));
                        enemyBullets.push(new EnemyBullet(this.x, this.y + this.height * 0.8));
                        this.shotInterval = Math.random() * 800 + 700;
                    } else {
                        enemyBullets.push(new EnemyBullet(this.x, this.y + this.height / 2));
                    }
                    this.lastShotTime = Date.now();
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.width, this.y);
                ctx.scale(-1, 1);

                if (this.isBoss) {
                    ctx.shadowColor = '#ff3366';
                    ctx.shadowBlur = 30;
                }

                ctx.drawImage(enemyImg, 0, 0, this.width, this.height);
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, targetEnemy) {
                this.x = x;
                this.y = y;
                this.width = 25;
                this.height = 6;
                this.color = '#ffcc00';
                this.speed = 20;
                this.target = targetEnemy;
            }
            update() {
                this.x += this.speed;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        class EnemyBullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 15;
                this.height = 6;
                this.color = '#ff3366';
                this.speed = 8;
            }
            update() {

            }

                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.velocity = {
                    x: (Math.random() - 0.5) * 15,
                    y: (Math.random() - 0.5) * 15
                };
                this.radius = Math.random() * 3 + 1;
                this.life = 1;
                this.color = Math.random() > 0.5 ? '#ffcc00' : '#ff3366';
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.life -= 0.05;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        }

        function setupLevels() {
            if (currentLang === 'EN') {
                level1Words = shuffleArray(masterLevel1_EN).slice(0, 5);
                level2Words = shuffleArray(masterLevel2_EN).slice(0, 5);
                level3Words = shuffleArray(masterLevel3_EN).slice(0, 10);
                level4Phrases = shuffleArray(masterLevel4_EN).slice(0, 10);
                level5Phrase = bossPhrase_EN;
            } else {
                level1Words = shuffleArray(masterLevel1_KH).slice(0, 5);
                level2Words = shuffleArray(masterLevel2_KH).slice(0, 5);
                level3Words = shuffleArray(masterLevel3_KH).slice(0, 10);
                level4Phrases = shuffleArray(masterLevel4_KH).slice(0, 10);
                level5Phrase = bossPhrase_KH;
            }
            updateUIText();
        }

        langBtn.addEventListener('click', () => {
            currentLang = currentLang === 'EN' ? 'KH' : 'EN';
            updateUIText();

            if (gameStarted && !isGameOver) {
                triggerGameOver(false);
                restartBtn.click();
            }
        });

        closeLearningBtn.addEventListener('click', () => {
            learningModal.style.display = 'none';
        });

        function updateHPDisplay() {
            let hearts = "";
            for (let i = 0; i < hp; i++) {
                hearts += "вқӨпёҸ ";
            }
            hpDisplay.innerText = "HP: " + hearts;
        }

        function checkHeal() {
            if (currentLevel >= 3) {
                consecutiveKills++;
                if (consecutiveKills >= 5) {
                    hp++;
                    updateHPDisplay();
                    consecutiveKills = 0;

                    targetWordDisplay.style.color = "#00ff00";
                    hpDisplay.style.color = "#00ff00";
                    setTimeout(() => {
                        targetWordDisplay.style.color = (currentLevel === 5) ? "#ff3366" : "#00ffcc";
                        hpDisplay.style.color = "#00ffcc";
                    }, 500);
                }
            }
        }

        function updateTargetWordDisplayL4() {
            targetWordDisplay.innerText = currentPhraseWords.join(' ');
        }

        function updateTargetWordDisplayL5() {
            targetWordDisplay.innerText = bossWords.join(' ');
        }

        function triggerGameOver(isWin = false, missedWord = null) {
            isGameOver = true;
            activeEnemy = null;
            currentPhraseEnemies = [];
            bossEnemy = null;
            enemyBullets = [];

            checkHighScore();

            if (isWin) {
                let clearMsg = currentLang === 'EN' ? "MISSION ACCOMPLISHED!" : "бһ”бҹҒбһҹбһҖбһҖбһҳбҹ’бһҳбһҮбҹ„бһӮбһҮбҹҗбһҷ!";
                if (mistakesInLevel === 0) {
                    hp++; updateHPDisplay();
                    clearMsg += currentLang === 'EN' ? " (PERFECT!)" : " (бһҘбһҸбһҒбҹ’бһ…бҹ„бҹҮ!)";
                }
                targetWordDisplay.innerText = clearMsg;
                targetWordDisplay.style.color = "#ffcc00";
                targetWordDisplay.style.textShadow = "0 0 20px #ffcc00, 0 0 40px #ffcc00";
                typeInput.placeholder = currentLang === 'EN' ? "YOU WON!" : "бһўбҹ’бһ“бһҖбһҲбҹ’бһ“бҹҮбһ бһҫбһҷ!";
            } else {
                targetWordDisplay.innerText = currentLang === 'EN' ? "GAME OVER" : "бһ”бһҡбһ¶бһҮбҹҗбһҷ";
                targetWordDisplay.style.color = "#ff3366";
                targetWordDisplay.style.textShadow = "0 0 20px #ff3366, 0 0 40px #ff3366";
                typeInput.placeholder = currentLang === 'EN' ? "MISSION FAILED" : "бһ”бҹҒбһҹбһҖбһҖбһҳбҹ’бһҳбһ”бһҡбһ¶бһҮбҹҗбһҷ";
                player.isDead = true;

                if (missedWord && dictDefs[missedWord]) {
                    learningWord.innerText = missedWord;
                    learningDef.innerText = dictDefs[missedWord];
                    learningModal.style.display = 'block';
                }
            }

            typeInput.value = "";
            typeInput.disabled = true;
            bgmSound.pause();
            restartBtn.style.display = "block";
        }

        startBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            gameStarted = true;
            typeInput.disabled = false;
            typeInput.focus();
            mistakesInLevel = 0; 

            bgmSound.play().catch(e => console.log("Audio play prevented", e));

            setupLevels();
            spawnNextEnemy();
            gameLoop();
        });

        restartBtn.addEventListener('click', () => {
            currentLevel = 1;
            hp = 5;
            score = 0;
            isGameOver = false;
            consecutiveKills = 0;
            mistakesInLevel = 0; 
            updateHPDisplay();

            learningModal.style.display = 'none';

            setupLevels();

            bullets = [];
            enemyBullets = [];
            particles = [];
            currentPhraseEnemies = [];

            player.isDead = false;
            player.x = player.baseX;
            player.y = canvas.height / 2 - 25;
            player.targetY = player.y;
            player.fallSpeed = 0;

            levelDisplay.innerText = "LEVEL 1";
            targetWordDisplay.style.color = "#00ffcc";
            typeInput.disabled = false;
            typeInput.value = "";
            typeInput.focus();

            restartBtn.style.display = "none";
            bgmSound.play().catch(e => console.log("Audio play prevented", e));

            spawnNextEnemy();
        });

        function spawnNextEnemy() {
            if (currentLevel === 1) {
                if (level1Words.length > 0) {
                    activeEnemy = new Enemy(level1Words.shift(), enemySpeedLevel1, false);
                    targetWordDisplay.innerText = activeEnemy.word;
                    player.setTargetY(activeEnemy.y + (activeEnemy.height / 2));
                } else {
                    transitionToLevel(2);
                }
            } else if (currentLevel === 2) {
                if (level2Words.length > 0) {
                    activeEnemy = new Enemy(level2Words.shift(), enemySpeedLevel2, false);
                    targetWordDisplay.innerText = activeEnemy.word;
                    player.setTargetY(activeEnemy.y + (activeEnemy.height / 2));
                } else {
                    transitionToLevel(3);
                }
            } else if (currentLevel === 3) {
                if (level3Words.length > 0) {
                    activeEnemy = new Enemy(level3Words.shift(), enemySpeedLevel3, true);
                    targetWordDisplay.innerText = activeEnemy.word;
                    player.setTargetY(activeEnemy.y + (activeEnemy.height / 2));
                } else {
                    transitionToLevel(4);
                }
            } else if (currentLevel === 4) {
                activeEnemy = null;
                if (level4Phrases.length > 0) {
                    let nextPhrase = level4Phrases.shift();
                    currentPhraseWords = nextPhrase.split(' ');
                    currentPhraseEnemies = [];

                    for (let i = 0; i < currentPhraseWords.length; i++) {
                        let enemy = new Enemy(currentPhraseWords[i], enemySpeedLevel4, true);
                        enemy.x = canvas.width + (i * 120);
                        currentPhraseEnemies.push(enemy);
                    }
                    updateTargetWordDisplayL4();
                    player.setTargetY(currentPhraseEnemies[0].y + (currentPhraseEnemies[0].height / 2));
                } else {
                    transitionToLevel(5);
                }
            } else if (currentLevel === 5) {
                bossWords = level5Phrase.split(' ');
                bossHP = bossWords.length;
                bossEnemy = new Enemy("BOSS", 0.5, true, true);

                targetWordDisplay.style.color = "#ff3366";
                updateTargetWordDisplayL5();
                player.setTargetY(bossEnemy.y + (bossEnemy.height / 2));
            }
        }

        function transitionToLevel(nextLevel) {
            activeEnemy = null;
            let clearMsg = currentLang === 'EN' ? `LEVEL ${nextLevel - 1} CLEARED!` : `бһҶбҹ’бһӣбһ„бһңбһӮбҹ’бһӮбһ‘бһё ${nextLevel - 1}!`;

            if (mistakesInLevel === 0) {
                hp++;
                updateHPDisplay();
                clearMsg += currentLang === 'EN' ? " (PERFECT +1 HP!)" : " (бһҘбһҸбһҒбҹ’бһ…бҹ„бҹҮ +бҹЎ бһҮбһёбһңбһ·бһҸ!)";

                targetWordDisplay.style.color = "#00ff00";
                hpDisplay.style.color = "#00ff00";
                setTimeout(() => {
                    targetWordDisplay.style.color = "#ffcc00";
                    hpDisplay.style.color = "#00ffcc";
                }, 1000);
            }

            mistakesInLevel = 0; 

            targetWordDisplay.innerText = clearMsg;
            targetWordDisplay.style.color = "#ffcc00";
            typeInput.disabled = true;

            setTimeout(() => {
                currentLevel = nextLevel;
                let lvlTxt = nextLevel === 5 ? (currentLang === 'EN' ? "FINAL BOSS" : "бһҳбҹҒбһҒбҹ’бһӣбҹ„бһ„бһ’бҹҶ") : `LEVEL ${nextLevel}`;
                levelDisplay.innerText = lvlTxt;
                targetWordDisplay.style.color = nextLevel === 5 ? "#ff3366" : "#00ffcc";
                typeInput.disabled = false;
                typeInput.focus();
                spawnNextEnemy();
            }, 2500);
        }

        updateUIText();

        typeInput.addEventListener('input', function (event) {
            if (isGameOver || !gameStarted) return;

            let typedWord = typeInput.value.trim().toUpperCase();
            if (typedWord === "") return;

            let targetCheckWord = "";

            if (currentLevel <= 3 && activeEnemy && !activeEnemy.isTargeted) {
                targetCheckWord = activeEnemy.word.toUpperCase();
            } else if (currentLevel === 4 && currentPhraseWords.length > 0) {
                targetCheckWord = currentPhraseWords[0].toUpperCase();
            } else if (currentLevel === 5 && bossEnemy && bossWords.length > 0) {
                targetCheckWord = bossWords[0].toUpperCase();
            }

            if (targetCheckWord !== "") {
                if (typedWord === targetCheckWord) {
                    if (currentLevel <= 3) {
                        activeEnemy.isTargeted = true;
                        player.dash();
                        bullets.push(new Bullet(player.x + player.width, player.y + player.height / 2, activeEnemy));
                        shootSound.currentTime = 0; shootSound.play();
                        typeInput.value = '';

                        let pts = currentLevel === 3 ? 20 : 10;
                        addScore(pts);
                    } else if (currentLevel === 4) {
                        let targetEnemy = currentPhraseEnemies.find(e => !e.isTargeted);
                        if (targetEnemy) {
                            targetEnemy.isTargeted = true;
                            player.dash();
                            bullets.push(new Bullet(player.x + player.width, player.y + player.height / 2, targetEnemy));
                            shootSound.currentTime = 0; shootSound.play();

                            currentPhraseWords.shift();
                            updateTargetWordDisplayL4();
                            typeInput.value = '';
                            addScore(30);

                            let nextTarget = currentPhraseEnemies.find(e => !e.isTargeted);
                            if (nextTarget) player.setTargetY(nextTarget.y + (nextTarget.height / 2));
                        }
                    } else if (currentLevel === 5) {
                        player.dash();
                        bullets.push(new Bullet(player.x + player.width, player.y + player.height / 2, bossEnemy));
                        shootSound.currentTime = 0; shootSound.play();

                        bossWords.shift();
                        updateTargetWordDisplayL5();
                        typeInput.value = '';
                        addScore(50);
                    }
                } else if (!targetCheckWord.startsWith(typedWord)) {
                    if (event.inputType !== 'deleteContentBackward') {
                        errorSound.currentTime = 0;
                        errorSound.play();
                        mistakesInLevel++; 

                        typeInput.style.backgroundColor = "rgba(255, 51, 102, 0.3)";
                        typeInput.style.borderColor = "#ff3366";
                        setTimeout(() => {
                            typeInput.style.backgroundColor = "rgba(0, 0, 0, 0.7)";
                            typeInput.style.borderColor = "#00ffcc";
                        }, 200);
                    }
                }
            }
        });

        function gameLoop() {
            if (!gameStarted) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            if (currentLevel < 5) {
                stars.forEach(star => {
                    star.update();
                    star.draw();
                });
            }

            player.update();
            player.draw();

            // бһҖбһјбһҠ Level 1 бһҠбһӣбҹӢ 3 бһҠбҹӮбһӣбһҮбһҪбһҹбһҮбһ»бһӣбһҡбһҪбһ…бһҡбһ¶бһӣбҹӢ
            if (currentLevel <= 3 && activeEnemy) {
                activeEnemy.update();
                activeEnemy.draw();

                if (activeEnemy.x < player.x + (player.width / 2)) {
                    if (!player.isDead) {
                        hp--;
                        updateHPDisplay();
                        explodeSound.currentTime = 0; explodeSound.play();
                        for (let i = 0; i < 30; i++) particles.push(new Particle(player.x + player.width / 2, player.y + player.height / 2));

                        if (hp <= 0) {
                            triggerGameOver(false, activeEnemy.word);
                        } else {
                            spawnNextEnemy();
                            typeInput.value = '';
                        }
                    }
                }
            } // бһ”бһ·бһ‘бһҡбһ„бҹ’бһңбһ„бҹӢбһҖбҹ’бһҡбһ…бһҖ Level 1-3 бһҷбҹүбһ¶бһ„бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң

            // бһҖбһјбһҠ Level 4 бһҠбҹӮбһӣбһҮбһҪбһҹбһҮбһ»бһӣбһҡбһҪбһ…бһҡбһ¶бһӣбҹӢ
            if (currentLevel === 4) {
                for (let i = currentPhraseEnemies.length - 1; i >= 0; i--) {
                    let enemy = currentPhraseEnemies[i];
                    enemy.update();
                    enemy.draw();

                    if (enemy.x < player.x + (player.width / 2)) {
                        if (!player.isDead) {
                            hp--;
                            updateHPDisplay();
                            explodeSound.currentTime = 0; explodeSound.play();
                            for (let p = 0; p < 30; p++) particles.push(new Particle(player.x + player.width / 2, player.y + player.height / 2));

                            let missedWord = currentPhraseWords[0];
                            currentPhraseEnemies.splice(i, 1);
                            
                            if (currentPhraseWords.length > 0) {
                                currentPhraseWords.shift();
                                updateTargetWordDisplayL4();
                            }
                            
                            if (hp <= 0) {
                                triggerGameOver(false, missedWord);
                            } else if (currentPhraseEnemies.length === 0) {
                                spawnNextEnemy();
                            }
                        }
                    }
                }
            }

            // бһҖбһјбһҠ Level 5 
            if (currentLevel === 5 && bossEnemy) {
                bossEnemy.update();
                bossEnemy.draw();
                if (bossEnemy.x < player.x + (player.width / 2)) {
                    if (!player.isDead) {
                        hp = 0; updateHPDisplay(); explodeSound.currentTime = 0; explodeSound.play();
                        for (let p = 0; p < 30; p++) particles.push(new Particle(player.x + player.width / 2, player.y + player.height / 2));
                        triggerGameOver(false, bossWords[0]);
                    }
                }
            }

            // бһҖбһјбһҠбһӮбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бҹҶбһ—бҹ’бһӣбһҫбһ„бһҡбһ”бһҹбҹӢбһҷбһҫбһ„
            bullets.forEach((bullet, bIndex) => {
                bullet.update();
                bullet.draw();

                if (bullet.target && bullet.x >= bullet.target.x) {
                    bullets.splice(bIndex, 1);
                    explodeSound.currentTime = 0; explodeSound.play();

                    for (let i = 0; i < 20; i++) particles.push(new Particle(bullet.x, bullet.y));

                    if (currentLevel <= 3) {
                        checkHeal();
                        spawnNextEnemy();
                    } else if (currentLevel === 4) {
                        let eIndex = currentPhraseEnemies.indexOf(bullet.target);
                        if (eIndex > -1) {
                            currentPhraseEnemies.splice(eIndex, 1);
                            checkHeal();
                        }
                        if (currentPhraseEnemies.length === 0) spawnNextEnemy();
                    } else if (currentLevel === 5 && bullet.target === bossEnemy) {
                        bossHP--;
                        checkHeal();
                        if (bossHP <= 0) {
                            bossEnemy = null;
                            addScore(500);
                            triggerGameOver(true);
                        }
                    }
                }
            });

            // бһҖбһјбһҠбһӮбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бҹҶбһ—бҹ’бһӣбһҫбһ„бһҹбһҸбҹ’бһҡбһјбһң
            enemyBullets.forEach((eBullet, ebIndex) => {
                eBullet.update();
                eBullet.draw();

                if (!player.isDead && eBullet.x < player.x + player.width &&
                    eBullet.x + eBullet.width > player.x &&
                    eBullet.y < player.y + player.height &&
                    eBullet.y + eBullet.height > player.y) {

                    enemyBullets.splice(ebIndex, 1);
                    hp--;
                    updateHPDisplay();
                    explodeSound.currentTime = 0; explodeSound.play();
                    for (let i = 0; i < 30; i++) particles.push(new Particle(player.x + player.width / 2, player.y + player.height / 2));

                    if (hp <= 0) {
                        let missedWord = "";
                        if (currentLevel <= 3 && activeEnemy) missedWord = activeEnemy.word;
                        else if (currentLevel === 4 && currentPhraseWords.length > 0) missedWord = currentPhraseWords[0];
                        else if (currentLevel === 5 && bossWords.length > 0) missedWord = bossWords[0];

                        triggerGameOver(false, missedWord);
                    }
                } else if (eBullet.x < 0) {
                    enemyBullets.splice(ebIndex, 1);
                }
            });

            particles.forEach((particle, pIndex) => {
                if (particle.life <= 0) particles.splice(pIndex, 1);
                else { particle.update(); particle.draw(); }
            });

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
